<html lang="es">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Código</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url("Captura de pantalla 2026-03-19 140959.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #cccccc;
        }
        .contenedor {
            background-color: rgba(255, 255, 255, 0.97);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
        }
        .logo {
            max-width: 180px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            width: 90%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            border: 2px solid #0056b3;
            border-radius: 5px;
            font-size: 16px;
            text-transform: uppercase;
        }
        button {
            background-color: #0097A7;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #007B8A;
        }
        #resultado {
            margin-top: 20px;
            font-weight: bold;
        }
        .exito { color: #28a745; font-size: 20px; }
        .error { color: #dc3545; }
    </style>
</head>
<body>

    <div class="contenedor">
        <img src="logo.jpg" alt="Logo" class="logo">
        <h2>Obtén tu Código</h2>
        <p>Por favor, coloca tu CURP a continuación:</p>

        <input type="text" id="curpInput" placeholder="Escribe aquí tu CURP..."

        <div id="resultado"></div>
    </div>
